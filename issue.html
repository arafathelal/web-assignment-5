<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Isue Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>

<body class="font-[Geist]">
    <!-- <h1>ISSUE TRACKER PAGE</h1> -->

    <!-- Navbar -->
    <nav class="flex items-center justify-between px-12 py-4">

        <div class="flex items-center gap-3">
            <img src="assets/github-logo.png" class="w-14 h-14" alt="">
            <h1 class="text-lg font-semibold">GitHub Issue Tracker</h1>
        </div>

        <form class="flex items-center gap-3">
            <input type="search" placeholder="Search Issues"
                class="px-4 py-2 rounded-md border border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-500">

            <button type="submit"
                class="px-5 py-2 rounded-md text-white font-medium bg-[#4A00FF] hover:opacity-90 transition">
                Sign In
            </button>
        </form>

    </nav>

    <div class="mx-[245px] mt-10">

        <div class="bg-white rounded-xl shadow-sm p-4 flex gap-4">

            <button class="px-6 py-2 rounded-md text-white font-medium bg-purple-900">
                All
            </button>

            <button class="px-6 py-2 rounded-md border border-gray-300 text-gray-600">
                Open
            </button>

            <button class="px-6 py-2 rounded-md border border-gray-300 text-gray-600">
                Closed
            </button>

        </div>

    </div>


    <div class=" mx-[245px] mt-6">

        <div class="bg-white rounded-xl shadow-sm p-6 flex justify-between items-center">

            <div class="flex items-center gap-2.5">
                <img src="assets/Aperture.png" alt="">
                <div>
                    <h2 class="text-lg font-semibold">50 Issues</h2>
                    <p class="text-gray-500 text-sm">
                        Track and manage your project issues
                    </p>
                </div>
            </div>

            <div class="flex items-center gap-6 text-sm">

                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                    <span class="text-gray-700">Open</span>
                </div>

                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                    <span class="text-gray-700">Closed</span>
                </div>

            </div>

        </div>

    </div>

<div id="issuesContainer"
     class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 items-stretch">
</div>
<script src="issue.js"></script>
</body>

</html>
